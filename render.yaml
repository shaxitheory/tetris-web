# Render Blueprint: one web service (the game) + one managed Postgres database.
# In Render: New + -> "Blueprint" -> pick this repo. Render reads this file and
# creates everything, wiring DATABASE_URL and generating a JWT_SECRET for you.
services:
  - type: web
    name: tetra
    runtime: node
    plan: free
    # Switch Prisma to Postgres, generate the client, and create the tables.
    buildCommand: npm install && node scripts/set-db.mjs postgres && npx prisma generate && npx prisma db push
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tetra-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong random secret
      - key: NODE_VERSION
        value: "22"

databases:
  - name: tetra-db
    plan: free
